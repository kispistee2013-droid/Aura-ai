<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI - Az Intelligens Asszisztens</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/v6dfZhzQ/Gemini-Generated-Image-y1uvrcy1uvrcy1uv.png">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            background: #030712;
            color: #f9fafb;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 10px;
        }

        .chat-head {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 5px;
        }

        .ai-eyes {
            display: flex;
            gap: 35px;
            margin-bottom: 5px;
        }

        .eye {
            width: 80px;
            height: 80px;
            background: #ffffff;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.6);
            animation: blink 4s infinite;
        }

        .pupil {
            width: 35px;
            height: 35px;
            background: #000000;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid #a855f7;
            transition: all 0.1s ease;
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        .ai-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0;
            letter-spacing: 2px;
        }

        .status-badge {
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.4);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #c084fc;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 15px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 60vh;
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
        }

        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .ai-msg {
            background: #1f2937;
            color: #f3f4f6;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #374151;
        }

        .input-area {
            padding: 15px;
            background: #1f2937;
            display: flex;
            gap: 10px;
            border-top: 1px solid #374151;
        }

        input {
            flex: 1;
            background: #030712;
            border: 1px solid #4b5563;
            padding: 12px 16px;
            border-radius: 14px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #a855f7;
        }

        button {
            background: linear-gradient(to right, #a855f7, #ec4899);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .media-container {
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #4b5563;
            max-width: 100%;
        }

        .media-container img, .media-container video {
            width: 100%;
            display: block;
        }
        
        .typing-indicator {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #f3f4f6;
            border-radius: 50%;
            margin-right: 3px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator:nth-child(2) { animation-delay: .2s; }
        .typing-indicator:nth-child(3) { animation-delay: .4s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <div class="chat-head">
        <div class="ai-eyes">
            <div class="eye"><div class="pupil" id="lp"></div></div>
            <div class="eye"><div class="pupil" id="rp"></div></div>
        </div>
        <div class="ai-title">AURA AI</div>
        <div class="status-badge">
            <div class="status-dot"></div>
            Élő AI Kapcsolat Aktív
        </div>
    </div>

    <div class="chat-container">
        <div class="messages-area" id="msgArea">
            <div class="message ai-msg">
                Szia! Aura vagyok, a te személyes intelligens asszisztensed. Most már valódi, élő AI-jal válaszolok neked bármire! Ha képet vagy videót szeretnél generálni, csak írd bele a szövegedbe (pl. "generálj egy képet egy neon macskáról"). Miben segíthetek ma? 🌌🤖✨
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Kérdezz bármit magyarul...">
            <button id="sendBtn">Küldés</button>
        </div>
    </div>

    <script>
        const msgArea = document.getElementById('msgArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const lp = document.getElementById('lp');
        const rp = document.getElementById('rp');

        // Szemek követése (egér és ujj is)
        function moveEyes(clientX, clientY) {
            const x = (clientX / window.innerWidth) * 100;
            const y = (clientY / window.innerHeight) * 100;
            const moveX = (x - 50) * 0.3;
            const moveY = (y - 50) * 0.3;
            lp.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
            rp.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
        }

        document.addEventListener('mousemove', (e) => moveEyes(e.clientX, e.clientY));
        document.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) moveEyes(e.touches[0].clientX, e.touches[0].clientY);
        });

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        function addMessage(text, isUser, mediaHtml = '') {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
            msg.innerHTML = text + mediaHtml;
            msg.style.whiteSpace = 'pre-wrap';
            msgArea.appendChild(msg);
            msgArea.scrollTop = msgArea.scrollHeight;
        }

        function showTyping() {
            const msg = document.createElement('div');
            msg.className = 'message ai-msg';
            msg.id = 'typing-box';
            msg.innerHTML = '<div class="typing-indicator"></div><div class="typing-indicator"></div><div class="typing-indicator"></div>';
            msgArea.appendChild(msg);
            msgArea.scrollTop = msgArea.scrollHeight;
        }

        function removeTyping() {
            const box = document.getElementById('typing-box');
            if (box) box.remove();
        }

        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = '';

            showTyping();
            processAI(text);
        }

        async function processAI(input) {
            const lowInput = input.toLowerCase();

            // 1. VIDEÓ GENERÁLÁSI LOGIKA (Beágyazott minták)
            if (lowInput.includes('videó') || lowInput.includes('video') || lowInput.includes('filmet')) {
                removeTyping();
                let videoSrc = "https://assets.mixkit.co/videos/preview/mixkit-abstract-laser-lights-background-42176-large.mp4";
                if (lowInput.includes('macska') || lowInput.includes('cica')) {
                    videoSrc = "https://player.vimeo.com/external/343110991.sd.mp4?s=5a1cbfb94157e96b4db46d29da76646ca79d67be";
                } else if (lowInput.includes('űr') || lowInput.includes('űrhajó')) {
                    videoSrc = "https://player.vimeo.com/external/403843516.sd.mp4?s=1d5cfd4177d4c96dd9d5e3f5be1c6e12e3e5b158";
                } else if (lowInput.includes('autó') || lowInput.includes('kocsi')) {
                    videoSrc = "https://player.vimeo.com/external/435674703.sd.mp4?s=6f4af450d032fb778e2023de218b6288339f20e4";
                }
                const mediaHtml = `<div class="media-container"><video src="${videoSrc}" controls autoplay loop muted></video></div>`;
                addMessage("Elkészítettem a kért videó-animációt:", false, mediaHtml);
                return;
            }

            // 2. KÉP GENERÁLÁSI LOGIKA (Valódi Pollinations AI képalkotás!)
            if (lowInput.includes('kép') || lowInput.includes('rajz') || lowInput.includes('fotó') || lowInput.includes('generálj')) {
                removeTyping();
                // Kivesszük a kulcsszavakat, hogy tiszta promptot kapjunk az angol/magyar AI-nak
                let prompt = input.replace(/(generálj|kép|rajz|fotó|egy|itt|vagy|mutass)/gi, '').trim();
                if(!prompt) prompt = "cyberpunk robot aura neon glowing light";
                
                const encodedPrompt = encodeURIComponent(prompt);
                const imgSrc = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=500&height=500&nologo=true`;
                
                const mediaHtml = `<div class="media-container"><img src="${imgSrc}" alt="AI Kép"></div>`;
                addMessage(`Íme az elkészült kép a következő leírás alapján: "${prompt}"`, false, mediaHtml);
                return;
            }

            // 3. VALÓDI ÉLŐ CHAT VÁLASZOK (Pollinations Text API)
            try {
                // Elküldjük a Pollinations AI-nak az üzenetet egy rendszer-utasítással, hogy magyarul beszéljen
                const systemPrompt = "Te Aura AI vagy, egy dögös kinézetű robot asszisztens. Beszélj mindig magyarul, légy kedves, fiatalos, használj emojikat és válaszolj röviden, barátságosan.";
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(input)}?system=${encodeURIComponent(systemPrompt)}`);
                
                if (!response.ok) throw new Error("API hiba");
                
                const aiResponseText = await response.text();
                removeTyping();
                addMessage(aiResponseText, false);
                
            } catch (error) {
                // Biztonsági tartalék válasz hálózati hiba esetére
                removeTyping();
                addMessage("Szia! Kicsit leterhelt a hálózatom, de itt vagyok! Mit szeretnél tesztelni? 😊", false);
            }
        }
    </script>
</body>
</html>
