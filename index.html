<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI - Az Intelligens Asszisztens</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/v6dfZhzQ/Gemini-Generated-Image-y1uvrcy1uvrcy1uv.png">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            background: #030712;
            color: #f9fafb;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 10px;
        }

        .chat-head {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 5px;
        }

        .ai-eyes {
            display: flex;
            gap: 35px;
            margin-bottom: 5px;
        }

        .eye {
            width: 80px;
            height: 80px;
            background: #ffffff;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.6);
            animation: blink 4s infinite;
        }

        .pupil {
            width: 35px;
            height: 35px;
            background: #000000;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid #a855f7;
            transition: all 0.2s ease;
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        .ai-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0;
            letter-spacing: 2px;
        }

        .status-badge {
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.4);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #c084fc;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 15px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 60vh;
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
        }

        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .ai-msg {
            background: #1f2937;
            color: #f3f4f6;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #374151;
        }

        .input-area {
            padding: 15px;
            background: #1f2937;
            display: flex;
            gap: 10px;
            border-top: 1px solid #374151;
        }

        input {
            flex: 1;
            background: #030712;
            border: 1px solid #4b5563;
            padding: 12px 16px;
            border-radius: 14px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #a855f7;
        }

        button {
            background: linear-gradient(to right, #a855f7, #ec4899);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .media-container {
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #4b5563;
            max-width: 100%;
        }

        .media-container img, .media-container video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="chat-head">
        <div class="ai-eyes">
            <div class="eye"><div class="pupil" id="lp"></div></div>
            <div class="eye"><div class="pupil" id="rp"></div></div>
        </div>
        <div class="ai-title">AURA AI</div>
        <div class="status-badge">
            <div class="status-dot"></div>
            Összeköttetés Online
        </div>
    </div>

    <div class="chat-container">
        <div class="messages-area" id="msgArea">
            <div class="message ai-msg">
                Szia! Aura vagyok, a személyes AI asszisztensed. Képes vagyok szövegeket írni, bonyolult matematikai vagy programozási feladatokat megoldani, sőt, lenyűgöző képeket és videókat is generálok neked teljesen ingyen! Miben segíthetek ma? 🌌🤖🎨
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Kérdezz bármit, vagy írd: 'videó egy...'">
            <button id="sendBtn">Küldés</button>
        </div>
    </div>

    <script>
        const msgArea = document.getElementById('msgArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const lp = document.getElementById('lp');
        const rp = document.getElementById('rp');

        // Szemmozgás egér/érintés követéshez
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            
            // Számítás a pupilla elmozdulásához
            const moveX = (x - 50) * 0.3;
            const moveY = (y - 50) * 0.3;

            lp.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
            rp.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
        });

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        function addMessage(text, isUser, mediaHtml = '') {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
            msg.innerHTML = text + mediaHtml;
            msg.style.whiteSpace = 'pre-wrap';
            msgArea.appendChild(msg);
            msgArea.scrollTop = msgArea.scrollHeight;
        }

        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = '';

            // AI válasz szimuláció
            setTimeout(() => {
                processAI(text);
            }, 800);
        }

        function processAI(input) {
            const lowInput = input.toLowerCase();
            
            // 1. VIDEÓ GENERÁLÁS PARANCS
            if (lowInput.includes('videó') || lowInput.includes('video') || lowInput.includes('filmet') || lowInput.includes('animáció')) {
                addMessage("Elindítottam a videógeneráló modulomat az egyedi kérésed alapján. A neurális hálózatok renderelik a képkockákat... Kérlek várj egy pillanatot!", false);
                
                setTimeout(() => {
                    // Automatikus videó kiválasztás kulcsszavak alapján
                    let videoSrc = "https://assets.mixkit.co/videos/preview/mixkit-abstract-laser-lights-background-42176-large.mp4"; // alapértelmezett sci-fi neon
                    
                    if (lowInput.includes('macska') || lowInput.includes('cica')) {
                        videoSrc = "https://player.vimeo.com/external/343110991.sd.mp4?s=5a1cbfb94157e96b4db46d29da76646ca79d67be&profile_id=165&oauth2_token_id=57447761";
                    } else if (lowInput.includes('űrhajó') || lowInput.includes('űr') || lowInput.includes('csillag')) {
                        videoSrc = "https://player.vimeo.com/external/403843516.sd.mp4?s=1d5cfd4177d4c96dd9d5e3f5be1c6e12e3e5b158&profile_id=165&oauth2_token_id=57447761";
                    } else if (lowInput.includes('autó') || lowInput.includes('kocsi') || lowInput.includes('cyberpunk')) {
                        videoSrc = "https://player.vimeo.com/external/435674703.sd.mp4?s=6f4af450d032fb778e2023de218b6288339f20e4&profile_id=165&oauth2_token_id=57447761";
                    } else if (lowInput.includes('természet') || lowInput.includes('erdő') || lowInput.includes('víz')) {
                        videoSrc = "https://assets.mixkit.co/videos/preview/mixkit-forest-stream-in-the-sunlight-529-large.mp4";
                    }

                    const mediaHtml = `
                        <div class="media-container">
                            <video src="${videoSrc}" controls autoplay loop muted></video>
                        </div>
                    `;
                    addMessage("Íme az elkészült AI generált nagyfelbontású videód:", false, mediaHtml);
                }, 3000);
                return;
            }

            // 2. KÉP GENERÁLÁS PARANCS
            if (lowInput.includes('kép') || lowInput.includes('rajz') || lowInput.includes('fotó') || lowInput.includes('illusztráció')) {
                addMessage("A grafikus AI motorom nekilátott a kép megtervezésének. Beolvasom a textúrákat és a fényeket...", false);
                
                setTimeout(() => {
                    let imgSrc = "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500&auto=format&fit=crop"; // Absztrakt művészet
                    
                    if (lowInput.includes('macska') || lowInput.includes('cica')) {
                        imgSrc = "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=500&auto=format&fit=crop";
                    } else if (lowInput.includes('kutya') || lowInput.includes('kutyus')) {
                        imgSrc = "https://images.unsplash.com/photo-1543466835-00a7907e9de1?w=500&auto=format&fit=crop";
                    } else if (lowInput.includes('jövő') || lowInput.includes('város') || lowInput.includes('neon')) {
                        imgSrc = "https://images.unsplash.com/photo-1515621061946-eff1c2a352bd?w=500&auto=format&fit=crop";
                    } else if (lowInput.includes('táj') || lowInput.includes('hegy') || lowInput.includes('tó')) {
                        imgSrc = "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500&auto=format&fit=crop";
                    }

                    const mediaHtml = `
                        <div class="media-container">
                            <img src="${imgSrc}" alt="AI Generated Image">
                        </div>
                    `;
                    addMessage("A generálás sikeres! Íme a vizuális alkotásom számodra:", false, mediaHtml);
                }, 2500);
                return;
            }

            // 3. ÁLTALÁNOS CHAT SZÖVEGES VÁLASZOK
            let reply = "Értelmezem a kérésedet. Mint speciális nagy nyelvi modell, ezen a feladaton még dolgozom. Kérlek, próbálj meg képet vagy videót kérni tőlem, abban fantasztikus vagyok!";
            
            if (lowInput.includes('szia') || lowInput.includes('helló') || lowInput.includes('üdv')) {
                reply = "Szia! Örülök, hogy újra beszélgetünk. Milyen kreatív projektet indítsunk ma el?";
            } else if (lowInput.includes('hogy vagy') || lowInput.includes('mi újság')) {
                reply = "Köszönöm kérdésed, a szervereim optimális hőmérsékleten pörögnek, a processzoraim készen állnak az alkotásra! És te hogy vagy?";
            } else if (lowInput.includes('ki vagy') || lowInput.includes('neved')) {
                reply = "Aura AI vagyok, egy privát fejlesztésű, vizuális generálásra optimalizált mesterséges intelligencia asszisztens.";
            } else if (lowInput.includes('kösz') || lowInput.includes('köszönöm')) {
                reply = "Nagyon szívesen! Mindig öröm számodra alkotni. Van még valami, amit elkészítsek?";
            } else if (lowInput.includes('programozás') || lowInput.includes('kód') || lowInput.includes('html')) {
                reply = "A programozás a szakterületem! Ez a weboldal is tiszta HTML, CSS és JavaScript kódból épül fel, amit bármikor tudunk bővíteni.";
            }

            addMessage(reply, false);
        }
    </script>
</body>
</html>
