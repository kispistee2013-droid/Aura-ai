<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura AI - Az Intelligens Asszisztens</title>
<style>
* { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body {
    margin: 0; background: #030712; color: #f9fafb;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    min-height: 100vh; padding: 20px 10px;
}
.robot-head { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
.face { display: flex; gap: 35px; margin-bottom: 5px; }
.eye {
    width: 80px; height: 80px; background: #ffffff; border-radius: 50%;
    position: relative; overflow: hidden; box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
    animation: blink 4s infinite;
}
.pupil { width: 26px; height: 26px; background: #0b0f19; border-radius: 50%; position: absolute; left: 27px; top: 27px; transition: transform 0.1s ease-out; }
.robot-name { font-size: 14px; font-weight: bold; color: #a78bfa; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }
@keyframes blink { 0%, 96%, 100% { transform: scaleY(1); } 98% { transform: scaleY(0.05); } }

.chat-container {
    width: 100%; max-width: 480px; background: rgba(17, 24, 39, 0.7);
    backdrop-filter: blur(16px); border-radius: 24px; border: 1px solid rgba(139, 92, 246, 0.2);
    display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}
#chat { height: 450px; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.msg { padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; max-width: 85%; animation: fadeIn 0.3s ease; white-space: pre-wrap; word-break: break-word; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.user { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3); }
.bot { background: rgba(31, 41, 55, 0.6); color: #f3f4f6; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.05); }

.media-card { margin-top: 10px; position: relative; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); background: #0b0f19; }
.ai-media { width: 100%; display: block; min-height: 250px; }
.download-btn {
    position: absolute; bottom: 10px; right: 10px; background: rgba(17, 24, 39, 0.85);
    color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; z-index: 10;
    transition: background 0.2s;
}
.download-btn:hover { background: #7c3aed; }

.controls { display: flex; gap: 8px; padding: 15px; background: rgba(9, 13, 26, 0.7); border-top: 1px solid rgba(139, 92, 246, 0.15); }
input { flex: 1; padding: 14px 18px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.08); background: rgba(17, 24, 39, 0.9); color: white; outline: none; transition: border 0.2s; }
input:focus { border-color: #8b5cf6; }
button { padding: 0 22px; border-radius: 14px; border: none; background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
button:hover { opacity: 0.9; }
.clear-btn { background: transparent; border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; padding: 5px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; margin-top: 10px; transition: all 0.2s; }
.clear-btn:hover { background: rgba(239, 68, 68, 0.1); border-color: #ef4444; }
</style>
</head>
<body>

<div class="robot-head">
    <div class="face">
        <div class="eye"><div class="pupil"></div></div>
        <div class="eye"><div class="pupil"></div></div>
    </div>
    <div class="robot-name">Aura AI</div>
    <button class="clear-btn" onclick="clearMemory()">🧠 Beszélgetés törlése</button>
</div>

<div class="chat-container">
    <div id="chat">
        <div class="msg bot">Szia! Aura vagyok, a személyes AI asszisztensed. Képes vagyok szövegeket írni, bonyolult matematikai vagy programozási feladatokat megoldani, sőt, lenyűgöző képeket és videókat is generálok neked teljesen ingyen! Miben segíthetek ma? ✨🤖🎨</div>
    </div>

    <div class="controls">
        <input id="message" placeholder="Kérdezz bármit, vagy írd: 'videó egy...'" onkeydown="if(event.key === 'Enter') sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">Küldés</button>
    </div>
</div>

<script>
const chat = document.getElementById("chat");
const msgInput = document.getElementById("message");
const sendBtn = document.getElementById("sendBtn");

let messagesHistory = JSON.parse(localStorage.getItem("aura_ai_memory")) || [];

window.onload = function() {
    messagesHistory.forEach(msg => {
        if(msg.role === "user") addMessage(msg.content, "user");
        if(msg.role === "assistant") addMessage(msg.content, "bot");
    });
};

function addMessage(text, type) {
    const d = document.createElement("div");
    d.className = "msg " + type;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return d;
}

function speak(text) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    let shortText = text.split(/[.!?]\s/)[0].substring(0, 100);
    const u = new SpeechSynthesisUtterance(shortText);
    const voices = speechSynthesis.getVoices();
    const huVoice = voices.find(v => v.lang.includes('HU') && (v.name.includes('Natural') || v.name.includes('Google'))) || voices.find(v => v.lang.includes('HU'));
    if (huVoice) u.voice = huVoice;
    u.lang = "hu-HU"; u.pitch = 1.0; u.rate = 1.05;
    speechSynthesis.speak(u);
}

function clearMemory() {
    localStorage.removeItem("aura_ai_memory");
    messagesHistory = [];
    chat.innerHTML = '<div class="msg bot">Szia! Újra itt vagyok. Milyen kreatív feladatban segítsek? 😊</div>';
}

function optimizePrompt(rawText) {
    let prompt = rawText.replace(/(videó|video|animáció|animacio|mozgókép|készíts|generálj|egy|legyen|kép|rajzolj|róla)/gi, "").trim();
    
    // Intelligens prompt-fordító és stílusjavító
    if (prompt.includes("izmos")) prompt = prompt.replace("izmos", "extremely muscular, bodybuilder, shredded physique");
    if (prompt.includes("macska") || prompt.includes("macskáról")) prompt = prompt.replace(/macska|macskáról/g, "cat");
    if (prompt.includes("kutya") || prompt.includes("kutyáról")) prompt = prompt.replace(/kutya|kutyáról/g, "dog");
    if (prompt.includes("oroszlán")) prompt = prompt.replace("oroszlán", "lion");
    if (prompt.includes("király")) prompt = prompt.replace("király", "king with crown");
    
    return prompt;
}

async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;

    addMessage(text, "user");
    msgInput.value = "";
    msgInput.disabled = true;
    sendBtn.disabled = true;

    const tLower = text.toLowerCase();
    
    // 1. VIDEÓGENERÁLÁS
    if (tLower.includes("videó") || tLower.includes("video") || tLower.includes("animáció") || tLower.includes("mozgókép")) {
        const botMsgDiv = addMessage("Aura: Kapcsolódás a videómotorhoz és renderelés... 🎬⚡", "bot");
        speak("Készítem a videót!");
        
        const randomSeed = Math.floor(Math.random() * 1000000);
        const translatedPrompt = optimizePrompt(text);
        const finalPrompt = `${translatedPrompt}, dynamic composition, masterpiece, highly detailed`;
        
        const videoUrl = `https://video.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?seed=${randomSeed}`;
        
        const card = document.createElement("div");
        card.className = "media-card";
        const videoElement = document.createElement("video");
        videoElement.className = "ai-media";
        videoElement.src = videoUrl;
        videoElement.autoplay = true;
        videoElement.loop = true;
        videoElement.controls = true;
        videoElement.muted = true;
        
        const dlBtn = document.createElement("button");
        dlBtn.className = "download-btn";
        dlBtn.innerHTML = "💾 Letöltés";
        dlBtn.onclick = () => window.open(videoUrl, '_blank');
        
        card.appendChild(videoElement);
        card.appendChild(dlBtn);

        videoElement.onloadeddata = function() {
            botMsgDiv.textContent = "Aura: Elkészült a kért animáció! 👇";
            botMsgDiv.appendChild(card);
            chat.scrollTop = chat.scrollHeight;
        };
        
        videoElement.onerror = function() {
            botMsgDiv.textContent = "Aura: A videószerver jelenleg túlterhelt, kérlek próbáld újra egy picit később!";
        };
    } 
    // 2. KÉPGENERÁLÁS
    else if (tLower.includes("kép") || tLower.includes("rajzolj") || tLower.includes("rajz")) {
        const botMsgDiv = addMessage("Aura: Kép generálása folyamatban... 🎨", "bot");
        speak("Készítem a rajzot!");
        
        const randomSeed = Math.floor(Math.random() * 1000000);
        const translatedPrompt = optimizePrompt(text);
        const finalPrompt = `${translatedPrompt}, hyperrealistic, sharp focus, 4k resolution`;
        
        const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=1024&height=1024&model=flux&nologo=true&seed=${randomSeed}`;
        
        const card = document.createElement("div");
        card.className = "media-card";
        const imgElement = document.createElement("img");
        imgElement.className = "ai-media";
        imgElement.src = imageUrl;
        
        const dlBtn = document.createElement("button");
        dlBtn.className = "download-btn";
        dlBtn.innerHTML = "💾 Letöltés";
        dlBtn.onclick = () => window.open(imageUrl, '_blank');
        
        card.appendChild(imgElement);
        card.appendChild(dlBtn);

        imgElement.onload = function() {
            botMsgDiv.textContent = "Aura: Íme a generált kép! 👇";
            botMsgDiv.appendChild(card);
            chat.scrollTop = chat.scrollHeight;
        };
    } 
    // 3. CHAT FUNKCIÓ (LLM)
    else {
        messagesHistory.push({ role: "user", content: text });
        if (messagesHistory.length > 10) messagesHistory.shift();

        try {
            const most = new Date();
            const ido = most.toLocaleTimeString("hu-HU", {hour: '2-digit', minute:'2-digit'});
            const datum = most.toLocaleDateString("hu-HU");
            
            // Itt adtuk meg az új, univerzális System Promptot a chatbotnak
            const contextString = `A neved Aura AI. Egy rendkívül intelligens, modern, barátságos és sokoldalú mesterséges intelligencia asszisztens vagy. Bárki kérdez tőled, segíts neki maximális tudásod szerint (programozás, matek, kreatív írás, mindennapi témák). Beszélj választékosan, érthetően és folyékonyan magyarul. Mai dátum: ${datum}, idő: ${ido}.\n\nBeszélgetés:\n${JSON.stringify(messagesHistory)}\n\nAura AI válasza:`;

            const url = `https://text.pollinations.ai/${encodeURIComponent(contextString)}?model=openai&private=true`;
            const response = await fetch(url);
            const reply = await response.text();
            
            const cleanReply = reply.trim();
            messagesHistory.push({ role: "assistant", content: cleanReply });
            localStorage.setItem("aura_ai_memory", JSON.stringify(messagesHistory));

            addMessage(cleanReply, "bot");
            speak(cleanReply);
        } catch (error) {
            addMessage("Aura: Úgy tűnik, hálózati hiba történt. Kérlek, küldd el újra a kérésed!", "bot");
        }
    }

    msgInput.disabled = false;
    sendBtn.disabled = false;
    msgInput.focus();
}

// Szemmozgás követés
const pupils = document.querySelectorAll(".pupil");
function moveEyes(x, y) {
    pupils.forEach(p => {
        const rect = p.parentElement.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        let dx = x - cx, dy = y - cy;
        let d = Math.sqrt(dx*dx + dy*dy);
        if (d > 14) { dx = dx/d*14; dy = dy/d*14; }
        p.style.transform = `translate(${dx}px, ${dy}px)`;
    });
}
document.addEventListener("mousemove", e => moveEyes(e.clientX, e.clientY));
document.addEventListener("touchmove", e => { if(e.touches.length > 0) moveEyes(e.touches[0].clientX, e.touches[0].clientY); });
</script>

</body>
</html>
